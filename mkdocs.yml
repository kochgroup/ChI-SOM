site_name: ChI-SOM Docs
repo_url: https://github.com/kochgroup/ChI-SOM
repo_name: kochgroup/ChI-SOM
site_author: Johannes Kaminski, Oliver Koch

theme:
  name: material
  navigation_depth: 2

markdown_extensions:
- pymdownx.snippets:

plugins:
- search
- macros 
- mkdocstrings:
    handlers:
      python:
        paths: [src]
        options:
          docstring_style: numpy
          docstring_options:
            ignore_init_summary: true
          docstring_section_style: list
          summary: true
          heading_level: 2
          show_root_heading: true
          show_root_full_path: true
          merge_init_into_class: true
          separate_signature: true
          show_signature_annotations: true
          show_source: false


nav:
  - Main:  README.md
  - How-To Guides: how-to-guides.md
  - Reference: reference.md
  - Acknowledgments: acknowledgements.md
